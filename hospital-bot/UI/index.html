<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedCare Hospital Appointment Bot</title>
    <meta name="description" content="Book your hospital appointments seamlessly with our AI bot.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Abstract Background -->
        <div class="bg-shape circle-1"></div>
        <div class="bg-shape circle-2"></div>
        <div class="bg-shape circle-3"></div>

        <div class="chat-wrapper glass-effect">
            <header class="chat-header">
                <div class="bot-info">
                    <div class="bot-avatar">
                        <i class="fa-solid fa-robot"></i>
                        <span class="status-dot"></span>
                    </div>
                    <div>
                        <h1>MedBot</h1>
                        <p>Hospital Assistant</p>
                    </div>
                </div>
                <button class="icon-btn" id="download-appt-btn" aria-label="Download Appointment Details" title="Download Appointment" style="display: none;"><i class="fa-solid fa-download"></i></button>
            </header>
            
            <main class="chat-window" id="chat-window">
                <!-- Messages will be injected here -->
            </main>
            
            <footer class="chat-input-area">
                <form id="chat-form">
                    <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" required>
                    <button type="submit" class="send-btn" aria-label="Send message">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </footer>
        </div>
    </div>
    
    <script defer src="main.js"></script>
</body>
</html>
